<!DOCTYPE html>
<html>
<head>
    <title>Snake Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: linear-gradient(135deg, #0d0d0d, #1a1a2e);
            display: flex;
            flex-direction: column;
        }

        /* Top Buttons - Fixed */
        .top-bar {
            width: 100%;
            padding: 10px;
            display: flex;
            gap: 10px;
            background: linear-gradient(135deg, #0d0d0d, #1a1a2e);
            position: fixed;
            top: 0;
            z-index: 100;
        }

        .top-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .start-btn {
            background: #00ff00;
            color: #000;
        }

        .back-btn {
            background: #ff4444;
            color: #fff;
        }

        /* Game Container */
        .game-container {
            width: 100%;
            max-width: 350px;
            margin: 60px auto 10px auto;
            padding: 0 10px;
            text-align: center;
        }

        h1 {
            color: #00ff00;
            font-size: 1.3rem;
            margin-bottom: 5px;
        }

        .score-box {
            background: rgba(0,0,0,0.8);
            border: 2px solid #00ff00;
            border-radius: 15px;
            padding: 5px 15px;
            display: inline-block;
            margin-bottom: 5px;
        }

        .score-box span {
            color: #00ff00;
            font-size: 1.1rem;
            font-weight: bold;
        }

        canvas {
            border: 2px solid #00ff00;
            border-radius: 6px;
            background: #000;
            display: block;
            margin: 0 auto;
        }

        /* Touch Controls */
        .controls {
            display: grid;
            grid-template-columns: repeat(3, 55px);
            gap: 5px;
            margin-top: 10px;
            justify-content: center;
        }

        .btn {
            width: 55px;
            height: 55px;
            background: rgba(0,255,0,0.2);
            border: 2px solid #00ff00;
            border-radius: 10px;
            color: #00ff00;
            font-size: 1.3rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .btn:active {
            background: rgba(0,255,0,0.5);
        }

        .btn-up { grid-column: 2; grid-row: 1; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }

        .info {
            color: #666;
            font-size: 0.7rem;
            margin-top: 8px;
        }

        /* Game Over */
        #gameOver {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 200;
        }

        #gameOver h2 {
            color: #ff0000;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        #gameOver p {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        #gameOver span {
            color: #00ff00;
            font-weight: bold;
        }

        .go-btns {
            display: flex;
            gap: 15px;
        }

        .go-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .restart { background: #00ff00; color: #000; }
        .go-back { background: #ff4444; color: #fff; }
    </style>
</head>
<body>

<!-- Top Buttons -->
<div class="top-bar">
    <button class="top-btn start-btn" onclick="startGame()">▶ Start</button>
    <button class="top-btn back-btn" onclick="goBack()">⬅ Back</button>
</div>

<div class="game-container">
    <h1>🐍 Snake Game</h1>
    
    <div class="score-box">
        Score: <span id="score">0</span>
    </div>
    
    <canvas id="gameCanvas" width="250" height="250"></canvas>
    
    <!-- Touch Controls -->
    <div class="controls">
        <div class="btn btn-up" onclick="move('UP')">⬆️</div>
        <div class="btn btn-left" onclick="move('LEFT')">⬅️</div>
        <div class="btn btn-down" onclick="move('DOWN')">⬇️</div>
        <div class="btn btn-right" onclick="move('RIGHT')">➡️</div>
    </div>
    
    <p class="info">Buttons ya swipe use karein</p>
</div>

<!-- Game Over -->
<div id="gameOver">
    <h2>💀 GAME OVER</h2>
    <p>Score: <span id="final">0</span></p>
    <div class="go-btns">
        <button class="go-btn restart" onclick="playAgain()">🔄 Play Again</button>
        <button class="go-btn go-back" onclick="goBack()">⬅ Back</button>
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    
    let box = 15;
    let snake = [];
    let food = {};
    let score = 0;
    let dir = "RIGHT";
    let nextDir = "RIGHT";
    let gameLoop = null;
    let running = false;
    let startX = 0;
    let startY = 0;

    // Start game function
    function startGame() {
        document.getElementById("gameOver").style.display = "none";
        
        if (gameLoop) {
            clearInterval(gameLoop);
        }
        
        // Initialize snake
        let startX = Math.floor(canvas.width / 2 / box) * box;
        let startY = Math.floor(canvas.height / 2 / box) * box;
        
        snake = [
            {x: startX, y: startY},
            {x: startX - box, y: startY},
            {x: startX - box*2, y: startY}
        ];
        
        // Random food
        spawnFood();
        
        score = 0;
        dir = "RIGHT";
        nextDir = "RIGHT";
        running = true;
        
        document.getElementById("score").innerText = score;
        
        // Start loop
        gameLoop = setInterval(update, 120);
    }

    function spawnFood() {
        let maxX = canvas.width / box - 2;
        let maxY = canvas.height / box - 2;
        
        food = {
            x: Math.floor(Math.random() * maxX + 1) * box,
            y: Math.floor(Math.random() * maxY + 1) * box
        };
    }

    // Move function for buttons
    function move(direction) {
        if (!running) return;
        
        if (direction === "LEFT" && dir !== "RIGHT") nextDir = "LEFT";
        else if (direction === "UP" && dir !== "DOWN") nextDir = "UP";
        else if (direction === "RIGHT" && dir !== "LEFT") nextDir = "RIGHT";
        else if (direction === "DOWN" && dir !== "UP") nextDir = "DOWN";
    }

    // Keyboard controls
    document.addEventListener("keydown", function(e) {
        if (!running) return;
        
        if (e.key === "ArrowLeft" && dir !== "RIGHT") nextDir = "LEFT";
        else if (e.key === "ArrowUp" && dir !== "DOWN") nextDir = "UP";
        else if (e.key === "ArrowRight" && dir !== "LEFT") nextDir = "RIGHT";
        else if (e.key === "ArrowDown" && dir !== "UP") nextDir = "DOWN";
    });

    // Swipe controls
    canvas.addEventListener("touchstart", function(e) {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
    });

    canvas.addEventListener("touchend", function(e) {
        if (!running) return;
        
        let endX = e.changedTouches[0].clientX;
        let endY = e.changedTouches[0].clientY;
        let dx = endX - startX;
        let dy = endY - startY;
        
        if (Math.abs(dx) < 30 && Math.abs(dy) < 30) return;
        
        if (Math.abs(dx) > Math.abs(dy)) {
            if (dx > 0 && dir !== "LEFT") nextDir = "RIGHT";
            else if (dx < 0 && dir !== "RIGHT") nextDir = "LEFT";
        } else {
            if (dy > 0 && dir !== "UP") nextDir = "DOWN";
            else if (dy < 0 && dir !== "DOWN") nextDir = "UP";
        }
    });

    // Main game update
    function update() {
        dir = nextDir;
        
        // Clear canvas
        ctx.fillStyle = "#0a0a0a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Draw grid
        ctx.strokeStyle = "rgba(0,255,0,0.05)";
        for (let i = 0; i < canvas.width; i += box) {
            ctx.beginPath();
            ctx.moveTo(i, 0);
            ctx.lineTo(i, canvas.height);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i);
            ctx.lineTo(canvas.width, i);
            ctx.stroke();
        }
        
        // Draw food
        ctx.fillStyle = "#ff2222";
        ctx.beginPath();
        ctx.arc(food.x + box/2, food.y + box/2, box/2 - 1, 0, Math.PI * 2);
        ctx.fill();
        
        // Draw snake
        for (let i = 0; i < snake.length; i++) {
            ctx.fillStyle = i === 0 ? "#00ff00" : "rgba(0, 200, 0, 1)";
            ctx.fillRect(snake[i].x + 1, snake[i].y + 1, box - 2, box - 2);
            
            // Eyes on head
            if (i === 0) {
                ctx.fillStyle = "#000";
                let ex = snake[i].x + box/2;
                let ey = snake[i].y + box/2;
                
                if (dir === "LEFT") {
                    ctx.fillRect(ex - 4, ey - 2, 2, 2);
                    ctx.fillRect(ex - 4, ey + 1, 2, 2);
                } else if (dir === "RIGHT") {
                    ctx.fillRect(ex + 1, ey - 2, 2, 2);
                    ctx.fillRect(ex + 1, ey + 1, 2, 2);
                } else if (dir === "UP") {
                    ctx.fillRect(ex - 2, ey - 4, 2, 2);
                    ctx.fillRect(ex + 1, ey - 4, 2, 2);
                } else {
                    ctx.fillRect(ex - 2, ey + 1, 2, 2);
                    ctx.fillRect(ex + 1, ey + 1, 2, 2);
                }
            }
        }
        
        // Calculate new position
        let head = {x: snake[0].x, y: snake[0].y};
        
        if (dir === "LEFT") head.x -= box;
        if (dir === "UP") head.y -= box;
        if (dir === "RIGHT") head.x += box;
        if (dir === "DOWN") head.y += box;
        
        // Check food
        if (head.x === food.x && head.y === food.y) {
            score++;
            document.getElementById("score").innerText = score;
            spawnFood();
        } else {
            snake.pop();
        }
        
        // Collision check
        if (head.x < 0 || head.y < 0 || head.x >= canvas.width || head.y >= canvas.height) {
            endGame();
            return;
        }
        
        for (let i = 0; i < snake.length; i++) {
            if (snake[i].x === head.x && snake[i].y === head.y) {
                endGame();
                return;
            }
        }
        
        snake.unshift(head);
    }

    function endGame() {
        running = false;
        clearInterval(gameLoop);
        document.getElementById("final").innerText = score;
        document.getElementById("gameOver").style.display = "flex";
    }

    function playAgain() {
        startGame();
    }

    // Back button - Opens home.html
    function goBack() {
        if (gameLoop) {
            clearInterval(gameLoop);
        }
        running = false;
        document.getElementById("gameOver").style.display = "none";
        
        // Open home.html
        window.location.href = "home.html";
    }
</script>

</body>
</html>
